<svg width="920" height="640" viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="920" height="640" fill="white"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b8bd4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9673a6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c49a00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b85450" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#82b366" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════════ -->
  <text x="460" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Security Monitoring — System Architecture</text>

  <!-- ══════════════════════════════════════════════════════
       ZONES
  ══════════════════════════════════════════════════════ -->
  <!-- External (Kali) -->
  <rect x="18" y="48" width="138" height="342" rx="10" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="87" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b7280">External</text>
  <text x="87" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">Kali Linux</text>

  <!-- AWS Cloud -->
  <rect x="163" y="48" width="594" height="534" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="460" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">AWS Cloud</text>

  <!-- Outputs -->
  <rect x="763" y="48" width="142" height="534" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="834" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">Outputs</text>

  <!-- Aggregation sub-band inside AWS -->
  <rect x="175" y="436" width="572" height="132" rx="8" fill="#fffbeb" stroke="#d6b656" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="461" y="452" text-anchor="middle" font-size="10" font-weight="bold" fill="#b45309">Aggregation Layer</text>

  <!-- Row labels -->
  <text x="181" y="92" font-size="10" fill="#94a3b8">► CloudTrail pipeline</text>
  <text x="181" y="202" font-size="10" fill="#94a3b8">► GuardDuty pipeline</text>
  <text x="181" y="312" font-size="10" fill="#94a3b8">► Prowler pipeline</text>

  <!-- ══════════════════════════════════════════════════════
       ROW 1 — CloudTrail
  ══════════════════════════════════════════════════════ -->
  <!-- CloudTrail/S3 -->
  <rect x="178" y="98" width="148" height="58" rx="8" fill="#bfdbfe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="252" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">CloudTrail</text>
  <text x="252" y="141" text-anchor="middle" font-size="10" fill="#3b5998">S3 bucket source</text>

  <line x1="326" y1="127" x2="342" y2="127" stroke="#5b8bd4" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- cloudtrail_analyzer.py -->
  <rect x="343" y="98" width="180" height="58" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="433" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#3d1a5e">cloudtrail_analyzer.py</text>
  <text x="433" y="141" text-anchor="middle" font-size="10" fill="#6b3fa0">Parses &amp; analyzes logs</text>

  <line x1="523" y1="127" x2="769" y2="127" stroke="#9673a6" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- alerts.csv -->
  <rect x="770" y="98" width="128" height="58" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="834" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d1a">alerts.csv</text>
  <text x="834" y="141" text-anchor="middle" font-size="10" fill="#2d7a2d">Alert output file</text>

  <!-- ══════════════════════════════════════════════════════
       ROW 2 — GuardDuty
  ══════════════════════════════════════════════════════ -->
  <!-- GuardDuty -->
  <rect x="178" y="208" width="128" height="58" rx="8" fill="#bfdbfe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="242" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e3a5f">GuardDuty</text>
  <text x="242" y="251" text-anchor="middle" font-size="10" fill="#3b5998">Threat detection</text>

  <line x1="306" y1="237" x2="324" y2="237" stroke="#5b8bd4" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- EventBridge -->
  <rect x="325" y="208" width="128" height="58" rx="8" fill="#fef9c3" stroke="#d6a020" stroke-width="1.2"/>
  <text x="389" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#4d3900">EventBridge</text>
  <text x="389" y="251" text-anchor="middle" font-size="10" fill="#7a5c00">Event routing</text>

  <line x1="453" y1="237" x2="471" y2="237" stroke="#d6a020" stroke-width="1.8" marker-end="url(#arr-amber)"/>

  <!-- Lambda -->
  <rect x="472" y="208" width="116" height="58" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="530" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d1a5e">Lambda</text>
  <text x="530" y="251" text-anchor="middle" font-size="10" fill="#6b3fa0">Processes event</text>

  <line x1="588" y1="237" x2="606" y2="237" stroke="#9673a6" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- SNS -->
  <rect x="607" y="208" width="100" height="58" rx="8" fill="#fecaca" stroke="#b85450" stroke-width="1.2"/>
  <text x="657" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#520000">SNS</text>
  <text x="657" y="251" text-anchor="middle" font-size="10" fill="#7a1010">Notification</text>

  <line x1="707" y1="237" x2="769" y2="237" stroke="#b85450" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- Email (alert) -->
  <rect x="770" y="208" width="128" height="58" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="834" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d1a">Email</text>
  <text x="834" y="251" text-anchor="middle" font-size="10" fill="#2d7a2d">GuardDuty alert</text>

  <!-- ══════════════════════════════════════════════════════
       ROW 3 — Prowler
  ══════════════════════════════════════════════════════ -->
  <!-- Prowler (Kali) -->
  <rect x="25" y="318" width="125" height="58" rx="8" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="88" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f2937">Prowler</text>
  <text x="88" y="361" text-anchor="middle" font-size="10" fill="#4b5563">Kali Linux scanner</text>

  <line x1="150" y1="347" x2="177" y2="347" stroke="#9ca3af" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- prowler_dashboard.py -->
  <rect x="178" y="318" width="178" height="58" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="267" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#3d1a5e">prowler_dashboard.py</text>
  <text x="267" y="361" text-anchor="middle" font-size="10" fill="#6b3fa0">Generates HTML report</text>

  <line x1="356" y1="347" x2="769" y2="347" stroke="#9673a6" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- HTML Dashboard -->
  <rect x="770" y="318" width="128" height="58" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="834" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d1a">HTML Dashboard</text>
  <text x="834" y="361" text-anchor="middle" font-size="10" fill="#2d7a2d">Visual findings</text>

  <!-- ══════════════════════════════════════════════════════
       ROW 4 — Aggregation
  ══════════════════════════════════════════════════════ -->
  <!-- Security Hub -->
  <rect x="198" y="462" width="162" height="62" rx="10" fill="#fde68a" stroke="#d6b656" stroke-width="1.8"/>
  <text x="279" y="488" text-anchor="middle" font-size="13" font-weight="bold" fill="#4d3900">Security Hub</text>
  <text x="279" y="507" text-anchor="middle" font-size="10" fill="#7a5c00">Aggregates all findings</text>

  <line x1="360" y1="493" x2="446" y2="493" stroke="#d6a020" stroke-width="1.8" marker-end="url(#arr-amber)"/>

  <!-- Daily Digest Lambda -->
  <rect x="447" y="462" width="178" height="62" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="536" y="488" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d1a5e">Daily Digest Lambda</text>
  <text x="536" y="507" text-anchor="middle" font-size="10" fill="#6b3fa0">Compiles daily summary</text>

  <line x1="625" y1="493" x2="769" y2="493" stroke="#9673a6" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Email (digest) -->
  <rect x="770" y="462" width="128" height="62" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="834" y="488" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a4d1a">Email</text>
  <text x="834" y="507" text-anchor="middle" font-size="10" fill="#2d7a2d">Daily digest</text>

  <!-- ══════════════════════════════════════════════════════
       DASHED FEED ARROWS: pipelines → Security Hub
       Routed cleanly via left margin (x=170) and separate y offsets
  ══════════════════════════════════════════════════════ -->
  <!-- cloudtrail_analyzer → SH (left margin route at x=170) -->
  <path d="M433,156 L433,163 L170,163 L170,428 L261,428 L261,462" fill="none" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- Lambda → SH (drops straight down at x=530, horizontal at y=436) -->
  <path d="M530,266 L530,436 L292,436 L292,462" fill="none" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- prowler_dashboard → SH (straight down at x=267) -->
  <path d="M267,376 L267,462" fill="none" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- Feed label -->
  <text x="146" y="396" text-anchor="middle" font-size="9" fill="#a78bfa" transform="rotate(-90, 146, 350)">feeds Security Hub</text>

  <!-- ══════════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════════ -->
  <rect x="18" y="592" width="886" height="42" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="38" y="610" font-size="10" font-weight="bold" fill="#6b7280">Legend:</text>

  <rect x="90" y="600" width="12" height="12" rx="2" fill="#bfdbfe" stroke="#6c8ebf"/>
  <text x="108" y="611" font-size="10" fill="#374151">AWS source</text>

  <rect x="192" y="600" width="12" height="12" rx="2" fill="#ede9fe" stroke="#9673a6"/>
  <text x="210" y="611" font-size="10" fill="#374151">Processing</text>

  <rect x="295" y="600" width="12" height="12" rx="2" fill="#fef9c3" stroke="#d6a020"/>
  <text x="313" y="611" font-size="10" fill="#374151">Routing / Aggregation</text>

  <rect x="440" y="600" width="12" height="12" rx="2" fill="#fecaca" stroke="#b85450"/>
  <text x="458" y="611" font-size="10" fill="#374151">Notification</text>

  <rect x="534" y="600" width="12" height="12" rx="2" fill="#bbf7d0" stroke="#82b366"/>
  <text x="552" y="611" font-size="10" fill="#374151">Output</text>

  <rect x="604" y="600" width="12" height="12" rx="2" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="622" y="611" font-size="10" fill="#374151">External</text>

  <line x1="680" y1="606" x2="710" y2="606" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="718" y="611" font-size="10" fill="#374151">Feeds Security Hub</text>
</svg>

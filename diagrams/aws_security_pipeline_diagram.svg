<svg width="900" height="660" viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="660" fill="white"/>

  <!-- Defs: arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b8bd4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9673a6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d6a020" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b85450" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#82b366" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== LANE 1: CloudTrail ===== -->
  <rect x="30" y="30" width="840" height="110" rx="10" fill="#dbeafe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="48" y="52" font-size="12" font-weight="bold" fill="#1e3a5f">Pipeline 1 — CloudTrail</text>
  <!-- Nodes -->
  <rect x="50" y="62" width="150" height="62" rx="8" fill="#bfdbfe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="125" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">CloudTrail</text>
  <text x="125" y="107" text-anchor="middle" font-size="11" fill="#3b5998">S3 bucket source</text>

  <rect x="290" y="62" width="195" height="62" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="387" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d1a5e">cloudtrail_analyzer.py</text>
  <text x="387" y="107" text-anchor="middle" font-size="11" fill="#6b3fa0">Parses &amp; analyzes logs</text>

  <rect x="580" y="62" width="150" height="62" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="655" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4d1a">alerts.csv</text>
  <text x="655" y="107" text-anchor="middle" font-size="11" fill="#2d7a2d">Alert output file</text>

  <line x1="200" y1="93" x2="288" y2="93" stroke="#5b8bd4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="485" y1="93" x2="578" y2="93" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ===== LANE 2: GuardDuty ===== -->
  <rect x="30" y="165" width="840" height="110" rx="10" fill="#f3e8ff" stroke="#9673a6" stroke-width="1.2"/>
  <text x="48" y="186" font-size="12" font-weight="bold" fill="#3d1a5e">Pipeline 2 — GuardDuty</text>

  <rect x="50" y="196" width="130" height="62" rx="8" fill="#bfdbfe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="115" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">GuardDuty</text>
  <text x="115" y="241" text-anchor="middle" font-size="11" fill="#3b5998">Threat detection</text>

  <rect x="215" y="196" width="130" height="62" rx="8" fill="#fef9c3" stroke="#d6a020" stroke-width="1.2"/>
  <text x="280" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#4d3900">EventBridge</text>
  <text x="280" y="241" text-anchor="middle" font-size="11" fill="#7a5c00">Event routing</text>

  <rect x="382" y="196" width="120" height="62" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="442" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d1a5e">Lambda</text>
  <text x="442" y="241" text-anchor="middle" font-size="11" fill="#6b3fa0">Processes event</text>

  <rect x="540" y="196" width="110" height="62" rx="8" fill="#fecaca" stroke="#b85450" stroke-width="1.2"/>
  <text x="595" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#520000">SNS</text>
  <text x="595" y="241" text-anchor="middle" font-size="11" fill="#7a1010">Notification</text>

  <rect x="690" y="196" width="100" height="62" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="740" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4d1a">Email</text>
  <text x="740" y="241" text-anchor="middle" font-size="11" fill="#2d7a2d">Alert delivery</text>

  <line x1="180" y1="227" x2="213" y2="227" stroke="#5b8bd4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="345" y1="227" x2="380" y2="227" stroke="#d6a020" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <line x1="502" y1="227" x2="538" y2="227" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="650" y1="227" x2="688" y2="227" stroke="#b85450" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- ===== LANE 3: Prowler ===== -->
  <rect x="30" y="300" width="840" height="110" rx="10" fill="#dcfce7" stroke="#82b366" stroke-width="1.2"/>
  <text x="48" y="321" font-size="12" font-weight="bold" fill="#1a4d1a">Pipeline 3 — Prowler (Kali)</text>

  <rect x="50" y="330" width="160" height="62" rx="8" fill="#bfdbfe" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="130" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">Prowler</text>
  <text x="130" y="375" text-anchor="middle" font-size="11" fill="#3b5998">Kali Linux scanner</text>

  <rect x="295" y="330" width="195" height="62" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="392" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d1a5e">prowler_dashboard.py</text>
  <text x="392" y="375" text-anchor="middle" font-size="11" fill="#6b3fa0">Generates report</text>

  <rect x="580" y="330" width="155" height="62" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="657" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4d1a">HTML Dashboard</text>
  <text x="657" y="375" text-anchor="middle" font-size="11" fill="#2d7a2d">Visual findings report</text>

  <line x1="210" y1="361" x2="293" y2="361" stroke="#5b8bd4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="490" y1="361" x2="578" y2="361" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ===== AGGREGATION LANE ===== -->
  <rect x="30" y="435" width="840" height="120" rx="10" fill="#fefce8" stroke="#d6b656" stroke-width="1.5"/>
  <text x="48" y="457" font-size="12" font-weight="bold" fill="#4d3900">Aggregation Layer — All Sources → Security Hub</text>

  <!-- Dashed feed lines from source nodes down to Security Hub -->
  <!-- CloudTrail → SH -->
  <path d="M125 140 L125 415 L370 415 L370 468" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <!-- GuardDuty → SH -->
  <path d="M115 275 L115 400 L370 400 L370 468" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <!-- Prowler → SH -->
  <path d="M130 410 L130 420 L370 420 L370 468" fill="none" stroke="#999" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>

  <rect x="290" y="468" width="165" height="62" rx="10" fill="#fde68a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="372" y="493" text-anchor="middle" font-size="14" font-weight="bold" fill="#4d3900">Security Hub</text>
  <text x="372" y="513" text-anchor="middle" font-size="11" fill="#7a5c00">Aggregates all findings</text>

  <rect x="510" y="468" width="175" height="62" rx="8" fill="#ede9fe" stroke="#9673a6" stroke-width="1.2"/>
  <text x="597" y="493" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d1a5e">Daily Digest Lambda</text>
  <text x="597" y="513" text-anchor="middle" font-size="11" fill="#6b3fa0">Compiles daily summary</text>

  <rect x="740" y="468" width="100" height="62" rx="8" fill="#bbf7d0" stroke="#82b366" stroke-width="1.2"/>
  <text x="790" y="493" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4d1a">Email</text>
  <text x="790" y="513" text-anchor="middle" font-size="11" fill="#2d7a2d">Daily digest</text>

  <line x1="455" y1="499" x2="508" y2="499" stroke="#d6a020" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <line x1="685" y1="499" x2="738" y2="499" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="580" width="840" height="55" rx="8" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="600" font-size="11" font-weight="bold" fill="#555">Legend:</text>
  <rect x="110" y="588" width="14" height="14" rx="3" fill="#bfdbfe" stroke="#6c8ebf"/>
  <text x="130" y="600" font-size="11" fill="#333">AWS data source</text>
  <rect x="255" y="588" width="14" height="14" rx="3" fill="#ede9fe" stroke="#9673a6"/>
  <text x="275" y="600" font-size="11" fill="#333">Processing / Lambda</text>
  <rect x="420" y="588" width="14" height="14" rx="3" fill="#fde68a" stroke="#d6b656"/>
  <text x="440" y="600" font-size="11" fill="#333">Routing / Aggregation</text>
  <rect x="600" y="588" width="14" height="14" rx="3" fill="#bbf7d0" stroke="#82b366"/>
  <text x="620" y="600" font-size="11" fill="#333">Output / Delivery</text>
  <line x1="110" y1="625" x2="140" y2="625" stroke="#999" stroke-width="1.3" stroke-dasharray="5,4"/>
  <text x="148" y="629" font-size="11" fill="#555">Feed into Security Hub</text>
</svg>
